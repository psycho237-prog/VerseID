name: Build VerseID (BibleBar)

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --ignore-scripts

      - name: Fix ffi-napi build issue (Patch libffi.gyp)
        shell: pwsh
        run: |
          $file = "node_modules/ffi-napi/deps/libffi/libffi.gyp"
          if (Test-Path $file) {
            $content = Get-Content $file
            $content = $content -replace "'call', 'preprocess_asm.cmd'", "'preprocess_asm.cmd'"
            $content = $content -replace '"call", "preprocess_asm.cmd"', '"preprocess_asm.cmd"'
            $content | Set-Content $file
            Write-Host "Patched libffi.gyp successfully."
          } else {
            Write-Host "libffi.gyp not found, skipping patch."
          }

      - name: Create .env file from secrets
        shell: bash
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "GEMINI_API_KEY_2=${{ secrets.GEMINI_API_KEY_2 }}" >> .env
          echo "GEMINI_API_KEY_3=${{ secrets.GEMINI_API_KEY_3 }}" >> .env
          echo "GEMINI_API_KEY_4=${{ secrets.GEMINI_API_KEY_4 }}" >> .env

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -f

      - name: Build Windows Executable
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload Artifact (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: VerseID-Windows-Installer
          path: dist/*.exe
          retention-days: 5

      - name: Get version from package.json
        id: version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Delete existing release and tag (if any)
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          gh release delete "v${{ steps.version.outputs.VERSION }}" --yes 2>$null; $true
          git push origin ":refs/tags/v${{ steps.version.outputs.VERSION }}" 2>$null; $true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: VerseID v${{ steps.version.outputs.VERSION }}
          body: |
            ## VerseID v${{ steps.version.outputs.VERSION }} 🎉

            **Real-time Bible verse detection app for Windows.**

            ### Features
            - 📖 Offline Bible verse detection using Fuse.js fuzzy matching
            - 🤖 Gemini AI fallback with automatic key rotation (4 keys)
            - 🎙️ Vosk-powered offline speech recognition
            - 🗃️ Local SQLite database for verse lookup & caching
            - 🔔 System tray integration with always-on-top overlay

            ### Installation
            1. Download **VerseID Setup ${{ steps.version.outputs.VERSION }}.exe** below
            2. Run the installer
            3. VerseID will appear in your system tray

            ### Notes
            - Requires Windows 10 or later
            - No internet connection required for basic verse detection
            - Gemini AI fallback activates automatically when local detection fails

            ---
            🔨 Built from commit ${{ github.sha }}
          files: dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
