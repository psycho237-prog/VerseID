<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerseID - BibleBar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="cross">✝</span>
                <h1>VerseID</h1>
            </div>
            <div class="status-badge offline" id="status-badge">OFFLINE</div>
            <button id="close-btn" class="icon-btn">&times;</button>
        </header>

        <main>
            <div class="transcription-container">
                <p id="live-text" class="placeholder">En attente de parole...</p>
            </div>

            <div class="result-area hidden" id="result-area">
                <div class="verse-reference" id="verse-ref">Jean 3:16</div>
                <div class="verse-text" id="verse-content">"Car Dieu a tant aimé le monde..."</div>
                <div class="verse-meta">
                    <span class="version-tag" id="verse-version">LSG</span>
                    <span class="source-tag" id="verse-source">Détection Locale</span>
                </div>
            </div>
        </main>

        <footer>
            <div class="controls">
                <button id="mic-btn" class="mic-btn">
                    <div class="pulse-ring"></div>
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
            </div>
            <div class="history-hint">Dernières détections via clic droit</div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
